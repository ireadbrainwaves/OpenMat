<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Mat — Positional Graph</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#0a0a0f; --surface:#13131d; --surface2:#1a1a28; --border:#2a2a3e;
    --text:#e8e8f0; --dim:#7878a0; --accent:#ff4444;
  }
  body { background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; overflow:hidden; height:100vh; }
  canvas { display:block; cursor:grab; }
  canvas:active { cursor:grabbing; }

  #header {
    position:fixed; top:0; left:0; right:0; z-index:10;
    padding:14px 20px; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg,rgba(10,10,15,.95) 0%,rgba(10,10,15,.7) 80%,transparent);
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-mark { width:32px; height:32px; background:var(--accent); border-radius:7px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#fff; }
  .logo-text { font-size:16px; font-weight:700; letter-spacing:-.3px; }
  .logo-sub { font-size:10px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; }
  .stats { display:flex; gap:16px; font-size:11px; color:var(--dim); }
  .stats b { color:var(--text); font-weight:600; }

  #sidebar {
    position:fixed; top:70px; left:12px; z-index:10; width:190px; display:flex; flex-direction:column; gap:6px;
  }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .panel-title { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--dim); margin-bottom:8px; }
  .filter-row { display:flex; align-items:center; gap:6px; padding:4px 6px; border-radius:5px; cursor:pointer; font-size:11px; color:var(--dim); transition:all .15s; }
  .filter-row:hover { background:var(--surface2); }
  .filter-row.on { color:var(--text); }
  .filter-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .belt-row { display:flex; gap:3px; flex-wrap:wrap; }
  .belt-btn { padding:3px 8px; border-radius:14px; border:1px solid var(--border); background:none; font-size:9px; cursor:pointer; text-transform:uppercase; font-weight:600; transition:all .15s; }
  .belt-btn.on { border-color:currentColor; }
  .edge-row { display:flex; gap:3px; }
  .edge-btn { flex:1; padding:5px; border-radius:5px; border:1px solid var(--border); background:none; color:var(--dim); font-size:10px; cursor:pointer; transition:all .15s; font-family:inherit; }
  .edge-btn.on { background:var(--surface2); color:var(--text); border-color:var(--dim); }

  #detail {
    position:fixed; bottom:12px; right:12px; z-index:10; width:320px; max-height:55vh;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:16px; overflow-y:auto; display:none; font-size:12px;
  }
  #detail.open { display:block; }
  .d-head { display:flex; justify-content:space-between; align-items:start; margin-bottom:10px; }
  .d-title { font-size:15px; font-weight:700; line-height:1.3; }
  .d-close { background:none; border:none; color:var(--dim); cursor:pointer; font-size:16px; }
  .d-fam { font-size:9px; text-transform:uppercase; letter-spacing:1px; padding:2px 7px; border-radius:4px; display:inline-block; margin-bottom:6px; }
  .d-desc { color:var(--dim); font-size:11px; line-height:1.5; margin-bottom:12px; }
  .d-stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:12px; }
  .d-stat { background:var(--surface2); border-radius:6px; padding:8px; }
  .d-stat-l { font-size:8px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin-bottom:3px; }
  .d-stat-v { font-size:16px; font-weight:700; }
  .d-section { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:10px 0 6px; }
  .d-tech { padding:5px 7px; border-radius:5px; font-size:10px; margin-bottom:2px; display:flex; justify-content:space-between; align-items:center; background:var(--surface2); }
  .d-tag { font-size:8px; padding:1px 5px; border-radius:3px; text-transform:uppercase; font-weight:600; }
  .d-tag.submission { background:rgba(255,68,68,.15); color:#ff4444; }
  .d-tag.transition { background:rgba(74,74,106,.3); color:#8888a0; }
  .d-tag.sweep { background:rgba(75,168,232,.15); color:#4ba8e8; }
  .d-tag.takedown { background:rgba(232,184,75,.15); color:#e8b84b; }
  .d-tag.escape { background:rgba(16,185,129,.15); color:#10b981; }

  #legend {
    position:fixed; bottom:12px; left:12px; z-index:10; display:flex; gap:10px;
    font-size:9px; color:var(--dim);
  }
  .leg { display:flex; align-items:center; gap:4px; }

  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div id="header">
  <div class="logo">
    <div class="logo-mark">OM</div>
    <div><div class="logo-text">Open Mat</div><div class="logo-sub">Positional Graph v1.0</div></div>
  </div>
  <div class="stats">
    <span><b id="s-pos">0</b> positions</span>
    <span><b id="s-tech">0</b> techniques</span>
    <span><b id="s-sub">0</b> submissions</span>
  </div>
</div>

<div id="sidebar">
  <div class="panel">
    <div class="panel-title">Families</div>
    <div id="fam-filters"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Belt Level</div>
    <div class="belt-row" id="belt-filters"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Edges</div>
    <div class="edge-row" id="edge-filters"></div>
  </div>
</div>

<div id="detail">
  <div class="d-head">
    <div class="d-title" id="d-title"></div>
    <button class="d-close" onclick="closeDetail()">✕</button>
  </div>
  <div id="d-body"></div>
</div>

<div id="legend">
  <div class="leg"><svg width="18" height="3"><line x1="0" y1="1.5" x2="18" y2="1.5" stroke="#ff4444" stroke-width="2" stroke-dasharray="4,2"/></svg>Sub</div>
  <div class="leg"><svg width="18" height="3"><line x1="0" y1="1.5" x2="18" y2="1.5" stroke="#4a4a6a" stroke-width="2"/></svg>Transition</div>
  <div class="leg"><svg width="18" height="3"><line x1="0" y1="1.5" x2="18" y2="1.5" stroke="#4ba8e8" stroke-width="2"/></svg>Sweep</div>
  <div class="leg"><svg width="18" height="3"><line x1="0" y1="1.5" x2="18" y2="1.5" stroke="#e8b84b" stroke-width="2"/></svg>Takedown</div>
  <div class="leg"><svg width="18" height="3"><line x1="0" y1="1.5" x2="18" y2="1.5" stroke="#10b981" stroke-width="2" stroke-dasharray="3,2"/></svg>Escape</div>
</div>

<canvas id="c"></canvas>

<script>

amble_resolve_back", "t_turtle_take_back_hooks", "t_turtle_escape_sit_out", "t_turtle_escape_granby", "t_technical_mount_to_back", "t_half_guard_back_take", "t_open_guard_technical_standup", "t_russian_tie_snap", "t_russian_tie_single", "t_hq_to_knee_slice", "t_knee_slice_complete"]}}};

const FC = {
  standing:'#e8b84b', clinch:'#e88a4b', guard:'#4ba8e8', passing:'#8b5cf6',
  side_control:'#e84b6a', mount:'#ff4444', back:'#f97316', leg_entanglement:'#10b981', transition:'#6b7280'
};
const FL = {
  standing:'Standing', clinch:'Clinch', guard:'Guard', passing:'Passing',
  side_control:'Side Control', mount:'Mount', back:'Back / Turtle', leg_entanglement:'Leg Entanglements', transition:'Scramble'
};
const EC = { submission:'#ff4444', transition:'#4a4a6a', sweep:'#4ba8e8', takedown:'#e8b84b', escape:'#10b981' };

let famOn = new Set(Object.keys(FC));
let beltOn = new Set(['white','blue','purple','brown','black']);
let edgeMode = 'all';
let selected = null;
let hovered = null;

// Build graph
const nodes = G.positions.map(p => ({
  ...p, x: Math.random()*800+200, y: Math.random()*600+100,
  vx:0, vy:0, r: p.is_submission_position ? 16 : (p.is_dominant ? 13 : 11)
}));
const nmap = {}; nodes.forEach(n => nmap[n.id] = n);

const edges = G.techniques.filter(t => t.to !== null).map(t => ({
  ...t, source: nmap[t.from], target: nmap[t.to]
}));
const subs = G.techniques.filter(t => t.to === null);

// Stats
document.getElementById('s-pos').textContent = nodes.length;
document.getElementById('s-tech').textContent = G.techniques.length;
document.getElementById('s-sub').textContent = subs.length;

// Filters UI
const famEl = document.getElementById('fam-filters');
Object.entries(FL).forEach(([k,v]) => {
  const d = document.createElement('div');
  d.className = 'filter-row on'; d.dataset.f = k;
  d.innerHTML = `<span class="filter-dot" style="background:${FC[k]}"></span>${v}`;
  d.onclick = () => { famOn.has(k) ? famOn.delete(k) : famOn.add(k); d.classList.toggle('on'); };
  famEl.appendChild(d);
});

const beltEl = document.getElementById('belt-filters');
[['white','#fff'],['blue','#4b9fe8'],['purple','#9b59b6'],['brown','#a0522d'],['black','#888']].forEach(([b,c]) => {
  const btn = document.createElement('button');
  btn.className = 'belt-btn on'; btn.style.color = c; btn.textContent = b;
  btn.onclick = () => { beltOn.has(b) ? beltOn.delete(b) : beltOn.add(b); btn.classList.toggle('on'); };
  beltEl.appendChild(btn);
});

const edgeEl = document.getElementById('edge-filters');
['all','subs','trans'].forEach(m => {
  const btn = document.createElement('button');
  btn.className = 'edge-btn' + (m==='all'?' on':''); btn.textContent = m==='all'?'All':m==='subs'?'Subs':'Trans';
  btn.onclick = () => { edgeMode = m; edgeEl.querySelectorAll('.edge-btn').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); };
  edgeEl.appendChild(btn);
});

// Canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, ox=0, oy=0, scale=1;

function resize() { W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
resize(); addEventListener('resize', resize);

// Center nodes
nodes.forEach(n => { n.x = W/2 + (Math.random()-.5)*600; n.y = H/2 + (Math.random()-.5)*400; });

// Force simulation
function tick() {
  const alpha = 0.3;
  // Center gravity
  nodes.forEach(n => {
    n.vx += (W/2 - n.x) * 0.0005;
    n.vy += (H/2 - n.y) * 0.0005;
  });
  // Link forces
  edges.forEach(e => {
    if (!e.source || !e.target) return;
    const dx = e.target.x - e.source.x;
    const dy = e.target.y - e.source.y;
    const d = Math.sqrt(dx*dx+dy*dy) || 1;
    const ideal = e.source.family === e.target.family ? 100 : 180;
    const f = (d - ideal) * 0.002 * alpha;
    const fx = dx/d*f, fy = dy/d*f;
    e.source.vx += fx; e.source.vy += fy;
    e.target.vx -= fx; e.target.vy -= fy;
  });
  // Repulsion
  for (let i=0; i<nodes.length; i++) {
    for (let j=i+1; j<nodes.length; j++) {
      const a=nodes[i], b=nodes[j];
      let dx=b.x-a.x, dy=b.y-a.y;
      let d=Math.sqrt(dx*dx+dy*dy)||1;
      if (d < 200) {
        const f = -300/(d*d)*alpha;
        const fx=dx/d*f, fy=dy/d*f;
        a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
      }
    }
  }
  // Apply velocity
  nodes.forEach(n => {
    n.vx *= 0.85; n.vy *= 0.85;
    n.x += n.vx; n.y += n.vy;
  });
}

function isEdgeVisible(e) {
  if (!famOn.has(e.source.family) || !famOn.has(e.target.family)) return false;
  if (!beltOn.has(e.belt_unlock)) return false;
  if (edgeMode==='subs' && e.type!=='submission') return false;
  if (edgeMode==='trans' && e.type==='submission') return false;
  return true;
}

function isNodeVisible(n) { return famOn.has(n.family); }

function connectedTo(nid) {
  const s = new Set([nid]);
  edges.forEach(e => {
    if (e.source.id===nid) s.add(e.target.id);
    if (e.target.id===nid) s.add(e.source.id);
  });
  return s;
}

function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(ox,oy);
  ctx.scale(scale,scale);

  const conn = selected ? connectedTo(selected.id) : null;

  // Edges
  edges.forEach(e => {
    if (!isEdgeVisible(e)) return;
    const dim = selected && !conn.has(e.source.id) && !conn.has(e.target.id);
    const hi = selected && (e.source.id===selected.id || e.target.id===selected.id);

    ctx.beginPath();
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);

    const col = EC[e.type] || '#4a4a6a';
    ctx.strokeStyle = dim ? hexToRgba(col, 0.05) : hi ? hexToRgba(col, 0.8) : hexToRgba(col, 0.2);
    ctx.lineWidth = hi ? 2.5 : 1.2;

    if (e.type==='submission' || e.type==='escape') {
      ctx.setLineDash(e.type==='submission' ? [6,3] : [3,3]);
    } else {
      ctx.setLineDash([]);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow
    if (!dim) {
      const dx=e.target.x-e.source.x, dy=e.target.y-e.source.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const tr = e.target.r + 4;
      const ax=e.target.x-dx/d*tr, ay=e.target.y-dy/d*tr;
      const ang=Math.atan2(dy,dx);
      const sz=hi?7:5;
      ctx.beginPath();
      ctx.moveTo(ax,ay);
      ctx.lineTo(ax-sz*Math.cos(ang-.4), ay-sz*Math.sin(ang-.4));
      ctx.lineTo(ax-sz*Math.cos(ang+.4), ay-sz*Math.sin(ang+.4));
      ctx.closePath();
      ctx.fillStyle = dim ? hexToRgba(col,0.05) : hi ? hexToRgba(col,0.7) : hexToRgba(col,0.25);
      ctx.fill();
    }

    // Edge label when selected
    if (hi && selected) {
      const mx=(e.source.x+e.target.x)/2, my=(e.source.y+e.target.y)/2;
      ctx.font='500 8px Inter,system-ui';
      ctx.fillStyle=hexToRgba('#e8e8f0',0.7);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const m = ctx.measureText(e.name);
      ctx.fillStyle=hexToRgba('#0a0a0f',0.85);
      ctx.fillRect(mx-m.width/2-3, my-6, m.width+6, 12);
      ctx.fillStyle=hexToRgba('#e8e8f0',0.8);
      ctx.fillText(e.name, mx, my);
    }
  });

  // Nodes
  nodes.forEach(n => {
    if (!isNodeVisible(n)) return;
    const dim = selected && conn && !conn.has(n.id);
    const isHov = hovered && hovered.id===n.id;
    const isSel = selected && selected.id===n.id;
    const col = FC[n.family];
    const alpha = dim ? 0.06 : 1;

    // Glow for submission positions
    if (n.is_submission_position && !dim) {
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r+8,0,Math.PI*2);
      ctx.fillStyle=hexToRgba(col,0.08); ctx.fill();
    }

    // Selection ring
    if (isSel || isHov) {
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r+5,0,Math.PI*2);
      ctx.strokeStyle=hexToRgba(col, isSel?0.9:0.4); ctx.lineWidth=isSel?2.5:1.5; ctx.stroke();
    }

    // Main circle
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=hexToRgba(col, n.is_dominant ? 0.7*alpha : 0.4*alpha);
    ctx.fill();
    ctx.strokeStyle=hexToRgba(col, 0.8*alpha); ctx.lineWidth=1.5; ctx.stroke();

    // Label
    if (!dim) {
      ctx.font='500 9px Inter,system-ui';
      ctx.fillStyle=hexToRgba('#e8e8f0', 0.85);
      ctx.textAlign='center'; ctx.textBaseline='top';
      const label = n.name.replace(/ \(.*\)/,'');
      if (label.includes(' — ')) {
        const parts=label.split(' — ');
        ctx.fillText(parts[0], n.x, n.y+n.r+5);
        ctx.fillText(parts[1], n.x, n.y+n.r+16);
      } else if (label.length > 22) {
        const mid=label.lastIndexOf(' ',18);
        if (mid>0) {
          ctx.fillText(label.slice(0,mid), n.x, n.y+n.r+5);
          ctx.fillText(label.slice(mid+1), n.x, n.y+n.r+16);
        } else ctx.fillText(label, n.x, n.y+n.r+5);
      } else ctx.fillText(label, n.x, n.y+n.r+5);

      // Sub icon
      if (n.is_submission_position) {
        ctx.font='8px sans-serif';
        ctx.fillStyle='#ff4444';
        ctx.textBaseline='middle';
        ctx.fillText('⚡', n.x, n.y-1);
      }
    }
  });

  ctx.restore();
  requestAnimationFrame(draw);
}

// Run physics for a while then slow down
let simSteps = 0;
function simulate() {
  if (simSteps < 400) { tick(); simSteps++; requestAnimationFrame(simulate); }
}
simulate();
draw();

// Interaction
let drag=null, pan=false, lastMx=0, lastMy=0;

function screenToWorld(sx,sy) { return [(sx-ox)/scale, (sy-oy)/scale]; }

function nodeAt(wx,wy) {
  for (let i=nodes.length-1; i>=0; i--) {
    const n=nodes[i];
    if (!isNodeVisible(n)) continue;
    const dx=n.x-wx, dy=n.y-wy;
    if (dx*dx+dy*dy < (n.r+4)*(n.r+4)) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const [wx,wy] = screenToWorld(e.clientX,e.clientY);
  const n = nodeAt(wx,wy);
  if (n) { drag=n; drag._ox=n.x-wx; drag._oy=n.y-wy; }
  else { pan=true; lastMx=e.clientX; lastMy=e.clientY; }
});

canvas.addEventListener('mousemove', e => {
  const [wx,wy] = screenToWorld(e.clientX,e.clientY);
  if (drag) {
    drag.x=wx+drag._ox; drag.y=wy+drag._oy;
    drag.vx=0; drag.vy=0;
  } else if (pan) {
    ox+=e.clientX-lastMx; oy+=e.clientY-lastMy;
    lastMx=e.clientX; lastMy=e.clientY;
  } else {
    hovered = nodeAt(wx,wy);
    canvas.style.cursor = hovered ? 'pointer' : 'grab';
  }
});

canvas.addEventListener('mouseup', e => {
  if (drag && !pan) {
    const [wx,wy]=screenToWorld(e.clientX,e.clientY);
    const n=nodeAt(wx,wy);
    if (n && n===drag) { selected=n; showDetail(n); }
  }
  if (!drag && pan) {
    const [wx,wy]=screenToWorld(e.clientX,e.clientY);
    if (!nodeAt(wx,wy)) { selected=null; closeDetail(); }
  }
  drag=null; pan=false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoom = e.deltaY < 0 ? 1.08 : 1/1.08;
  const mx=e.clientX, my=e.clientY;
  ox = mx - (mx-ox)*zoom;
  oy = my - (my-oy)*zoom;
  scale *= zoom;
  scale = Math.max(0.15, Math.min(4, scale));
}, {passive:false});

// Detail panel
function showDetail(n) {
  const panel=document.getElementById('detail');
  document.getElementById('d-title').textContent=n.name;
  const out=G.techniques.filter(t=>t.from===n.id);
  const inc=G.techniques.filter(t=>t.to===n.id);
  const subFrom=out.filter(t=>t.type==='submission');
  const trans=out.filter(t=>t.type!=='submission');
  let h=`<div class="d-fam" style="background:${hexToRgba(FC[n.family],.15)};color:${FC[n.family]}">${FL[n.family]||n.family}</div>`;
  h+=`<div class="d-desc">${n.description}</div>`;
  h+=`<div class="d-stats">
    <div class="d-stat"><div class="d-stat-l">Points</div><div class="d-stat-v">${n.points_value}</div></div>
    <div class="d-stat"><div class="d-stat-l">Subs</div><div class="d-stat-v" style="color:#ff4444">${subFrom.length}</div></div>
    <div class="d-stat"><div class="d-stat-l">Ways In</div><div class="d-stat-v">${inc.length}</div></div>
    <div class="d-stat"><div class="d-stat-l">Ways Out</div><div class="d-stat-v">${out.length}</div></div>
  </div>`;
  if (subFrom.length) {
    h+=`<div class="d-section">Submissions</div>`;
    subFrom.forEach(t=>{ h+=`<div class="d-tech"><span>${t.name}</span><span class="d-tag submission">SUB</span></div>`; });
  }
  if (trans.length) {
    h+=`<div class="d-section">Transitions Out</div>`;
    trans.forEach(t=>{
      const tgt=G.positions.find(p=>p.id===t.to);
      h+=`<div class="d-tech"><span>${t.name}</span><span class="d-tag ${t.type}">${t.type.slice(0,4).toUpperCase()}</span></div>`;
    });
  }
  if (inc.length) {
    h+=`<div class="d-section">Transitions In</div>`;
    inc.forEach(t=>{
      h+=`<div class="d-tech"><span>${t.name}</span><span class="d-tag ${t.type}">${t.type.slice(0,4).toUpperCase()}</span></div>`;
    });
  }
  document.getElementById('d-body').innerHTML=h;
  panel.classList.add('open');
}

function closeDetail() { document.getElementById('detail').classList.remove('open'); selected=null; }
</script>
